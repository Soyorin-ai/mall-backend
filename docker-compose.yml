version: '3.8'

services:
  # PostgreSQL - 主数据库
  postgres:
    image: postgres:16-alpine
    container_name: wechat_mall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: wechat_mall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wechat_mall_network

  # MongoDB - 文档数据库
  mongodb:
    image: mongo:7
    container_name: wechat_mall_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo123
      MONGO_INITDB_DATABASE: wechat_mall
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wechat_mall_network

  # Redis - 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: wechat_mall_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wechat_mall_network

  # Elasticsearch - 搜索引擎 (可选)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: wechat_mall_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - wechat_mall_network
    profiles:
      - elasticsearch  # 默认不启动，需要时加上 --profile elasticsearch

  # Redis Commander - Redis 可视化管理工具 (可选)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: wechat_mall_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - wechat_mall_network
    profiles:
      - tools  # 默认不启动，需要时加上 --profile tools

  # Mongo Express - MongoDB 可视化管理工具 (可选)
  mongo-express:
    image: mongo-express:latest
    container_name: wechat_mall_mongo_express
    restart: unless-stopped
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=mongo123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:mongo123@mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    ports:
      - "8082:8081"
    depends_on:
      - mongodb
    networks:
      - wechat_mall_network
    profiles:
      - tools  # 默认不启动，需要时加上 --profile tools

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  wechat_mall_network:
    driver: bridge
